<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Tag Generator | SmartTools</title>
<meta name="description" content="Generate basic SEO meta tags for websites.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>Meta Tag Generator</h1>
    <p class="desc">Generate basic SEO meta tags for websites.</p>
    <input class="input" id="title" placeholder="Page title">
<input class="input" id="desc" placeholder="Meta description">
<input class="input" id="keywords" placeholder="Keywords, comma separated">
<div class="toolbar"><button class="tool-btn" onclick="buildTags()">Generate Tags</button></div>
<pre id="result" class="result"></pre>
<div class="toolbar">
  <button class="tool-btn secondary" onclick="copyText(byId('result').innerText)">Copy</button>
  <button class="tool-btn secondary" onclick="downloadText('meta-tags.txt', byId('result').innerText)">Download</button>
</div>
    <a class="back-link" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>
<script>
function buildTags(){
  const t = byId('title').value.trim(), d = byId('desc').value.trim(), k = byId('keywords').value.trim();
  byId('result').innerText = `<title>${t}</title>\n<meta name="description" content="${d}">\n<meta name="keywords" content="${k}">`;
}
</script>
</body>
</html>
