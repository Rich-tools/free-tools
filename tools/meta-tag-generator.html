<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Meta Tag Generator – Generate SEO Meta Tags Free</title><meta name="description" content="Generate SEO title, description and keywords tags online for free."><link rel="stylesheet" href="../css/style.css"></head><body data-slug="meta-tag-generator"><div class="section"><div class="toolbox"><h1>Meta Tag Generator – Generate SEO Meta Tags Free</h1><p class="desc">Generate SEO title, description and keywords tags online for free.</p><input class="input" id="title" placeholder="Page title"><input class="input" id="desc" placeholder="Meta description"><input class="input" id="keywords" placeholder="Keywords, comma separated"><div class="toolbar"><button class="toolbtn" onclick="buildTags();incrementMetric('smarttools-opens','meta-tag-generator')">Generate</button><button class="toolbtn secondary" onclick="copyText(byId('result').innerText)">Copy</button></div><pre id="result" class="result"></pre><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script>function buildTags(){const t=byId('title').value.trim(),d=byId('desc').value.trim(),k=byId('keywords').value.trim();byId('result').innerText=`<title>${t}</title>\n<meta name="description" content="${d}">\n<meta name="keywords" content="${k}">`;}</script></body></html>
