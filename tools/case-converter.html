<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter | SmartTools</title>
<meta name="description" content="Convert text to upper, lower, title, and sentence case.">
<link rel="stylesheet" href="../css/style.css">

</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>Case Converter</h1>
    <p class="desc">Convert text to upper, lower, title, and sentence case.</p>
    
<textarea id="input" placeholder="Type text here..."></textarea>
<div class="toolbar">
  <button class="toolbtn" onclick="setCase('upper')">UPPER</button>
  <button class="toolbtn" onclick="setCase('lower')">lower</button>
  <button class="toolbtn" onclick="setCase('title')">Title</button>
  <button class="toolbtn" onclick="setCase('sentence')">Sentence</button>
</div>
<div id="result" class="result"></div>
<div class="toolbar"><button class="toolbtn secondary" onclick="copyText(byId('result').innerText)">Copy</button></div>

    <a class="back" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>

<script>
function titleCase(s){return s.toLowerCase().replace(/\b\w/g,m=>m.toUpperCase());}
function sentenceCase(s){return s.toLowerCase().replace(/(^\s*[a-z])|([.!?]\s*[a-z])/g,m=>m.toUpperCase());}
function setCase(type){
 let t=byId('input').value;
 if(type==='upper') t=t.toUpperCase();
 if(type==='lower') t=t.toLowerCase();
 if(type==='title') t=titleCase(t);
 if(type==='sentence') t=sentenceCase(t);
 byId('result').innerText=t;
}
</script>
</body>
</html>
