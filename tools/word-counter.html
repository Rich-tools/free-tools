<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter | SmartTools</title>
<meta name="description" content="Count words, characters, sentences, and reading time.">
<link rel="stylesheet" href="../css/style.css">

</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>Word Counter</h1>
    <p class="desc">Count words, characters, sentences, and reading time.</p>
    
<textarea id="input" placeholder="Paste or type text here..."></textarea>
<div class="toolbar"><button class="toolbtn" onclick="run()">Analyze</button><button class="toolbtn secondary" onclick="copyText(byId('input').value)">Copy Input</button></div>
<div class="stats">
  <div class="stat"><strong id="w">0</strong><span>Words</span></div>
  <div class="stat"><strong id="c">0</strong><span>Characters</span></div>
  <div class="stat"><strong id="s">0</strong><span>Sentences</span></div>
  <div class="stat"><strong id="rt">0 min</strong><span>Read Time</span></div>
</div>

    <a class="back" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>

<script>
function run(){
 const t=byId('input').value;
 const words=t.trim()?t.trim().split(/\s+/).length:0;
 byId('w').textContent=words;
 byId('c').textContent=t.length;
 byId('s').textContent=t.split(/[.!?]+/).filter(v=>v.trim()).length;
 byId('rt').textContent=Math.max(1,Math.ceil(words/200))+' min';
}
byId('input').addEventListener('input', run);
</script>
</body>
</html>
