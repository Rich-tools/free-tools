<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PDF Page Counter – Count Pages in PDF Online</title><meta name="description" content="Count total pages in a PDF file online for free."><link rel="stylesheet" href="../css/style.css"></head><body data-slug="pdf-page-counter"><div class="section"><div class="toolbox"><h1>PDF Page Counter – Count Pages in PDF Online</h1><p class="desc">Count total pages in a PDF file online for free.</p><div class="upload-zone">Upload a PDF file to count pages</div><input class="input" id="file" type="file" accept="application/pdf"><div class="toolbar"><button class="toolbtn" onclick="countPages();incrementMetric('smarttools-opens','pdf-page-counter')">Count Pages</button></div><div id="result" class="result">Upload a PDF file.</div><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script><script>async function countPages(){const file=byId('file').files[0];if(!file){byId('result').innerText='Choose a PDF file';return;}const pdf=await PDFLib.PDFDocument.load(await file.arrayBuffer());byId('result').innerText=`Pages: ${pdf.getPageCount()}`;}</script></body></html>
