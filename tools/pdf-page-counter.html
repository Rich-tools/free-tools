<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Page Counter | SmartTools</title>
<meta name="description" content="Upload a PDF and count the total pages.">
<link rel="stylesheet" href="../css/style.css">

</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>PDF Page Counter</h1>
    <p class="desc">Upload a PDF and count the total pages.</p>
    
<input class="input" id="file" type="file" accept="application/pdf">
<div id="result" class="result">Upload a PDF file.</div>

    <a class="back" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
document.getElementById('file').addEventListener('change', async e=>{
  const file=e.target.files[0]; if(!file)return;
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  document.getElementById('result').innerText=`Pages: ${pdf.numPages}`;
});
</script>

</body>
</html>
