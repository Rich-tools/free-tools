<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PDF Page Counter</title><link rel="stylesheet" href="../css/style.css"></head><body><div class="section"><div class="toolbox"><h1>PDF Page Counter</h1><p class="desc">Count pages in a PDF file.</p><input class="input" id="file" type="file" accept="application/pdf"><div class="toolbar"><button class="toolbtn" onclick="countPages()">Count Pages</button></div><div id="result" class="result">Upload a PDF file.</div><a class="open" href="../index.html">Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script><script>
async function countPages(){const file=byId('file').files[0];if(!file){byId('result').innerText='Choose a PDF file';return;}const pdf=await PDFLib.PDFDocument.load(await file.arrayBuffer());byId('result').innerText=`Pages: ${pdf.getPageCount()}`;}
</script></body></html>
