<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Picker From Image | SmartTools</title>
<meta name="description" content="Click an uploaded image to pick colors.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>Color Picker From Image</h1>
    <p class="desc">Click an uploaded image to pick colors.</p>
    <input class="input" id="file" type="file" accept="image/*">
<canvas id="canvas"></canvas>
<div id="result" class="result">Upload image and click any point.</div>
    <a class="back-link" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>
<script>
const c=byId('canvas'), ctx=c.getContext('2d');
byId('file').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  const img=new Image();
  img.onload=()=>{ const scale=Math.min(700/img.width,460/img.height,1); c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale); ctx.drawImage(img,0,0,c.width,c.height); };
  img.src=URL.createObjectURL(file);
});
c.addEventListener('click', e=>{
  const rect=c.getBoundingClientRect(); const x=Math.floor(e.clientX-rect.left), y=Math.floor(e.clientY-rect.top);
  const d=ctx.getImageData(x,y,1,1).data; const hex='#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
  byId('result').innerText=`HEX: ${hex} | RGB: ${d[0]}, ${d[1]}, ${d[2]}`;
});
</script>
</body>
</html>
