
<!DOCTYPE html>

<title>Base64 Encoder</title>

<body>
<div class="container">
<div class="toolbox">
<h2>Base64 Encoder</h2>

<textarea id='t'></textarea>
<button onclick='run()'>Encode</button>
<div id='r' class='result'></div>
<script>
function run(){
let t=document.getElementById('t').value;
document.getElementById('r').innerText=btoa(t);
}
</script>

</div>
