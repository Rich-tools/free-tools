<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DOCX Text Extractor – Extract Text From Word Files</title><meta name="description" content="Extract text from DOCX Word files online."><link rel="stylesheet" href="../css/style.css"></head><body data-slug="docx-text-extractor"><div class="section"><div class="toolbox"><h1>DOCX Text Extractor – Extract Text From Word Files</h1><p class="desc">Extract text from DOCX Word files online.</p><div class="upload-zone">Upload a DOCX file to extract text</div><input class="input" id="file" type="file" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document"><div class="toolbar"><button class="toolbtn" onclick="extract();incrementMetric('smarttools-opens','docx-text-extractor')">Extract Text</button><button class="toolbtn secondary" onclick="copyText(byId('result').innerText)">Copy</button></div><pre id="result" class="result"></pre><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script src="https://unpkg.com/mammoth@1.7.2/mammoth.browser.min.js"></script><script>async function extract(){const file=byId('file').files[0];if(!file){byId('result').innerText='Choose a DOCX file';return;}const res=await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});byId('result').innerText=res.value||'No text found';}</script></body></html>
