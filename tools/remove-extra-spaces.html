<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Extra Spaces | SmartTools</title>
<meta name="description" content="Clean repeated spaces and blank lines from text.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>Remove Extra Spaces</h1>
    <p class="desc">Clean repeated spaces and blank lines from text.</p>
    <textarea id="input" placeholder="Paste text with extra spaces..."></textarea>
<div class="toolbar"><button class="tool-btn" onclick="clean()">Clean Text</button></div>
<div id="result" class="result"></div>
<div class="toolbar">
  <button class="tool-btn secondary" onclick="copyText(byId('result').innerText)">Copy</button>
  <button class="tool-btn secondary" onclick="downloadText('clean-text.txt', byId('result').innerText)">Download</button>
</div>
    <a class="back-link" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>
<script>
function clean(){
  let t = byId('input').value.replace(/[ \t]+/g,' ').replace(/\n\s*\n+/g,'\n\n').trim();
  byId('result').innerText=t;
}
</script>
</body>
</html>
