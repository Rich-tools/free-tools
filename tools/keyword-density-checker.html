<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyword Density Checker | SmartTools</title>
<meta name="description" content="Analyze repeated keywords in a text.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>Keyword Density Checker</h1>
    <p class="desc">Analyze repeated keywords in a text.</p>
    <textarea id="input" placeholder="Paste article or paragraph..."></textarea>
<div class="toolbar"><button class="tool-btn" onclick="analyzeDensity()">Check Density</button></div>
<pre id="result" class="result"></pre>
    <a class="back-link" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>
<script>
function analyzeDensity(){
  const txt = byId('input').value.toLowerCase().replace(/[^a-z0-9\s]/g,' ');
  const words = txt.split(/\s+/).filter(w=>w.length>2); const total = words.length || 1;
  const count = {}; words.forEach(w=>count[w]=(count[w]||0)+1);
  const top = Object.entries(count).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([w,c])=>`${w}: ${c} (${((c/total)*100).toFixed(2)}%)`).join('\n');
  byId('result').innerText = top || 'No keywords found';
}
</script>
</body>
</html>
