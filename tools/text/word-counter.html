
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Counter</title>
<link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="container">
<div class="toolbox">
<h2>Word Counter</h2>
<textarea id="t"></textarea><button onclick="run()">Count</button>
<div id="result" class="result"></div>
</div>
</div>
<script>function run(){let t=document.getElementById("t").value;let w=t.trim()?t.trim().split(/\s+/).length:0;result.innerText="Words: "+w+" Characters: "+t.length;}</script>
</body>
</html>
