
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Password Generator</title>
<link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<div class="container">
<div class="toolbox">
<h2>Password Generator</h2>
<button onclick="gen()">Generate Password</button>
<div id="result" class="result"></div>
</div>
</div>
<script>function gen(){let c="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";let p="";for(let i=0;i<14;i++){p+=c[Math.floor(Math.random()*c.length)]}result.innerText=p;}</script>
</body>
</html>
