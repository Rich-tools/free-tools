
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Merge PDF</title>
<link rel="stylesheet" href="../../css/style.css">
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>
<div class="container">
<div class="toolbox">
<h2>Merge PDF</h2>
<input type="file" id="files" multiple><button onclick="merge()">Merge PDFs</button>
<div id="result" class="result"></div>
</div>
</div>
<script>
async function merge(){
const files=document.getElementById("files").files;
if(files.length<2){result.innerText="Select at least 2 PDFs";return;}
const merged=await PDFLib.PDFDocument.create();
for(const f of files){
const pdf=await PDFLib.PDFDocument.load(await f.arrayBuffer());
const pages=await merged.copyPages(pdf,pdf.getPageIndices());
pages.forEach(p=>merged.addPage(p));
}
const bytes=await merged.save();
const blob=new Blob([bytes],{type:"application/pdf"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="merged.pdf";
a.click();
result.innerText="Merged PDF downloaded";
}
</script>
</body>
</html>
