<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder Decoder | SmartTools</title>
<meta name="description" content="Encode and decode URLs quickly.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>URL Encoder Decoder</h1>
    <p class="desc">Encode and decode URLs quickly.</p>
    <textarea id="input" placeholder="Paste text or URL..."></textarea>
<div class="toolbar">
  <button class="tool-btn" onclick="enc()">Encode</button>
  <button class="tool-btn secondary" onclick="dec()">Decode</button>
</div>
<div id="result" class="result"></div>
    <a class="back-link" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>
<script>
function enc(){ byId('result').innerText = encodeURIComponent(byId('input').value); }
function dec(){ try{ byId('result').innerText = decodeURIComponent(byId('input').value); }catch(e){ byId('result').innerText='Invalid encoded URL'; } }
</script>
</body>
</html>
