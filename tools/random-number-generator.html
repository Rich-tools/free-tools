<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Number Generator | SmartTools</title>
<meta name="description" content="Generate random integers in any range.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>Random Number Generator</h1>
    <p class="desc">Generate random integers in any range.</p>
    <div class="row">
  <input class="input" id="min" type="number" value="1" placeholder="Minimum">
  <input class="input" id="max" type="number" value="100" placeholder="Maximum">
</div>
<div class="toolbar"><button class="tool-btn" onclick="run()">Generate</button></div>
<div id="result" class="result"></div>
    <a class="back-link" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>
<script>
function run(){
  let min = parseInt(byId('min').value || '1');
  let max = parseInt(byId('max').value || '100');
  if(max < min){ const t=min; min=max; max=t; }
  byId('result').innerText = String(Math.floor(Math.random()*(max-min+1))+min);
}
run();
</script>
</body>
</html>
