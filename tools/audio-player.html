<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Player | SmartTools</title>
<meta name="description" content="Preview uploaded audio files in-browser.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>Audio Player</h1>
    <p class="desc">Preview uploaded audio files in-browser.</p>
    <input class="input" id="file" type="file" accept="audio/*">
<audio id="audio" controls style="width:100%;margin-top:14px"></audio>
<div id="result" class="result">Upload an audio file to preview.</div>
    <a class="back-link" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>
<script>
byId('file').addEventListener('change', e=>{ const file=e.target.files[0]; if(!file) return; byId('audio').src=URL.createObjectURL(file); byId('result').innerText=`Name: ${file.name}\nSize: ${(file.size/1024).toFixed(1)} KB`; });
</script>
</body>
</html>
