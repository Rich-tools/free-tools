<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Video Metadata Viewer – Check Video Duration and Resolution</title><meta name="description" content="Check video duration, size and resolution online."><link rel="stylesheet" href="../css/style.css"></head><body data-slug="video-metadata-viewer"><div class="section"><div class="toolbox"><h1>Video Metadata Viewer – Check Video Duration and Resolution</h1><p class="desc">Check video duration, size and resolution online.</p><div class="upload-zone">Upload video to inspect metadata</div><input class="input" id="file" type="file" accept="video/*"><div id="result" class="result">Upload a video file.</div><a class="back" href="../index.html">← Back to SmartTools</a></div></div><script src="../js/helpers.js"></script><script>byId('file').addEventListener('change',e=>{incrementMetric('smarttools-opens','video-metadata-viewer');const f=e.target.files[0];if(!f)return;const v=document.createElement('video');v.preload='metadata';v.onloadedmetadata=()=>{byId('result').innerText=`Name: ${f.name}\nSize: ${(f.size/1024/1024).toFixed(2)} MB\nDuration: ${v.duration.toFixed(2)} sec\nResolution: ${v.videoWidth} x ${v.videoHeight}`;};v.src=URL.createObjectURL(f);});</script></body></html>
