<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Cropper | SmartTools</title>
<meta name="description" content="Create a simple center crop and download it.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>Image Cropper</h1>
    <p class="desc">Create a simple center crop and download it.</p>
    <input class="input" id="file" type="file" accept="image/*">
<div class="row">
  <input class="input" id="cropW" type="number" placeholder="Crop width">
  <input class="input" id="cropH" type="number" placeholder="Crop height">
</div>
<div class="toolbar">
  <button class="tool-btn" onclick="crop()">Crop</button>
  <button class="tool-btn secondary" onclick="downloadCanvas(byId('canvas'),'cropped-image.png')">Download PNG</button>
</div>
<canvas id="canvas"></canvas>
    <a class="back-link" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>
<script>
let cropImg;
byId('file').addEventListener('change', e=>{ const file=e.target.files[0]; if(!file) return; cropImg=new Image(); cropImg.src=URL.createObjectURL(file); });
function crop(){
  if(!cropImg){ alert('Upload image first'); return; }
  const cw=parseInt(byId('cropW').value||Math.min(300,cropImg.width));
  const ch=parseInt(byId('cropH').value||Math.min(300,cropImg.height));
  const sx=Math.max(0,Math.floor((cropImg.width-cw)/2)), sy=Math.max(0,Math.floor((cropImg.height-ch)/2));
  const c=byId('canvas'); c.width=cw; c.height=ch; c.getContext('2d').drawImage(cropImg,sx,sy,cw,ch,0,0,cw,ch);
}
</script>
</body>
</html>
