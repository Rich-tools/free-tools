<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator | SmartTools</title>
<meta name="description" content="Generate strong secure passwords with copy and download.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="section">
  <div class="toolbox">
    <h1>Password Generator</h1>
    <p class="desc">Generate strong secure passwords with copy and download.</p>
    <div class="row">
  <div><label>Length</label><input class="input" id="length" type="number" min="4" max="64" value="14"></div>
  <div><label>Include symbols</label><select class="input" id="symbols"><option value="yes">Yes</option><option value="no">No</option></select></div>
</div>
<div class="toolbar"><button class="tool-btn" onclick="generate()">Generate Password</button></div>
<div id="result" class="result"></div>
<div class="toolbar">
  <button class="tool-btn secondary" onclick="copyText(byId('result').innerText)">Copy</button>
  <button class="tool-btn secondary" onclick="downloadText('password.txt', byId('result').innerText)">Download</button>
</div>
    <a class="back-link" href="../index.html">← Back to SmartTools</a>
  </div>
</div>
<script src="../js/helpers.js"></script>
<script>
function generate(){
  const len = Math.max(4, Math.min(64, parseInt(byId('length').value||'14')));
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const syms = '!@#$%^&*()_+-={}[]<>?';
  const pool = byId('symbols').value==='yes' ? chars+syms : chars;
  const arr = new Uint32Array(len); crypto.getRandomValues(arr);
  let out=''; arr.forEach(n=>out += pool[n % pool.length]);
  byId('result').innerText=out;
}
generate();
</script>
</body>
</html>
