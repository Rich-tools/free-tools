<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator | Free Tools Hub</title>
  <meta name="description" content="Generate strong passwords with length and character options." />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <main class="container tool-page">
    <a class="back-link" href="../index.html">&larr; Back to home</a>
    <div class="tool-wrap" style="margin-top:18px;">
      <section class="editor">
        <h1>Password Generator</h1>
        <p class="note">Generate strong passwords with length and character options.</p>
        
<div class="row">
  <div>
    <label for="length">Length</label>
    <input id="length" type="number" min="4" max="64" value="14" />
  </div>
  <div>
    <label>&nbsp;</label>
    <div class="small">Choose what to include below</div>
  </div>
</div>
<div class="row">
  <label><input type="checkbox" id="upper" checked /> Uppercase</label>
  <label><input type="checkbox" id="lower" checked /> Lowercase</label>
  <label><input type="checkbox" id="numbers" checked /> Numbers</label>
  <label><input type="checkbox" id="symbols" checked /> Symbols</label>
</div>
<div class="actions">
  <button id="generateBtn">Generate password</button>
  <button class="alt" id="copyBtn">Copy</button>
</div>
<div class="output" id="passwordOutput"></div>

      </section>
      <aside class="panel">
        <h2>About this tool</h2>
        <p>Generate strong passwords with length and character options.</p>
        <p class="small">Tip: expand each tool page with FAQs and extra examples later for better Google ranking.</p>
      </aside>
    </div>
  </main>
  <script src="../js/tracking.js"></script>
  <script>
function generate(){
 let chars='';
 if(document.getElementById('upper').checked) chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
 if(document.getElementById('lower').checked) chars+='abcdefghijklmnopqrstuvwxyz';
 if(document.getElementById('numbers').checked) chars+='0123456789';
 if(document.getElementById('symbols').checked) chars+='!@#$%^&*()_+-={}[]:;<>,.?/';
 if(!chars){document.getElementById('passwordOutput').textContent='Select at least one option.';return;}
 const len=parseInt(document.getElementById('length').value)||12;
 let pass='';
 for(let i=0;i<len;i++) pass+=chars[Math.floor(Math.random()*chars.length)];
 document.getElementById('passwordOutput').textContent=pass;
 trackAction('Password generated');
}
document.getElementById('generateBtn').onclick=generate;
document.getElementById('copyBtn').onclick=function(){navigator.clipboard.writeText(document.getElementById('passwordOutput').textContent||'');trackAction('Password copied');};
generate();
</script>
</body>
</html>
